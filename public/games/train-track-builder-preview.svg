<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" fill="none">
  <!-- Background -->
  <rect width="320" height="200" rx="12" fill="url(#prevSky)"/>
  <!-- Hills -->
  <path d="M0,160 Q60,130 140,150 Q220,120 320,155 L320,200 L0,200Z" fill="#A8D8A0" opacity="0.5"/>
  <path d="M0,175 Q80,145 180,165 Q260,140 320,170 L320,200 L0,200Z" fill="#7BC47F" opacity="0.6"/>
  <!-- Grid area -->
  <rect x="40" y="60" width="240" height="100" rx="8" fill="#D4A574" opacity="0.4"/>
  <!-- Track pieces (simplified grid) -->
  <!-- Station A -->
  <rect x="45" y="85" width="30" height="30" rx="4" fill="#4AAF5A" opacity="0.8"/>
  <text x="60" y="105" text-anchor="middle" font-size="14" font-weight="bold" fill="white" font-family="sans-serif">A</text>
  <!-- Rail pieces -->
  <rect x="80" y="85" width="30" height="30" rx="3" fill="#C4956A"/>
  <line x1="80" y1="100" x2="110" y2="100" stroke="#5A5A5A" stroke-width="3"/>
  <rect x="115" y="85" width="30" height="30" rx="3" fill="#C4956A"/>
  <line x1="130" y1="85" x2="130" y2="115" stroke="#5A5A5A" stroke-width="3"/>
  <rect x="115" y="120" width="30" height="30" rx="3" fill="#C4956A"/>
  <line x1="115" y1="135" x2="145" y2="135" stroke="#5A5A5A" stroke-width="3"/>
  <rect x="150" y="120" width="30" height="30" rx="3" fill="#C4956A"/>
  <line x1="150" y1="135" x2="180" y2="135" stroke="#5A5A5A" stroke-width="3"/>
  <rect x="185" y="120" width="30" height="30" rx="3" fill="#C4956A"/>
  <line x1="200" y1="120" x2="200" y2="150" stroke="#5A5A5A" stroke-width="3"/>
  <rect x="185" y="85" width="30" height="30" rx="3" fill="#C4956A"/>
  <line x1="185" y1="100" x2="215" y2="100" stroke="#5A5A5A" stroke-width="3"/>
  <!-- Station B -->
  <rect x="220" y="85" width="30" height="30" rx="4" fill="#D94040" opacity="0.8"/>
  <text x="235" y="105" text-anchor="middle" font-size="14" font-weight="bold" fill="white" font-family="sans-serif">B</text>
  <!-- Tree obstacles -->
  <circle cx="95" cy="72" r="8" fill="#5FA663"/>
  <rect x="93" y="72" width="4" height="6" fill="#8B6914"/>
  <circle cx="165" cy="95" r="7" fill="#7BC47F"/>
  <rect x="163" y="95" width="4" height="5" fill="#8B6914"/>
  <!-- Train (small) -->
  <rect x="82" y="92" width="20" height="12" rx="3" fill="#D94040"/>
  <rect x="78" y="95" width="5" height="6" rx="1" fill="#FFD93D"/>
  <circle cx="87" cy="106" r="3" fill="#333"/>
  <circle cx="97" cy="106" r="3" fill="#333"/>
  <!-- Title -->
  <text x="160" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#4A4A4A" font-family="sans-serif">Train Track Builder</text>
  <text x="160" y="48" text-anchor="middle" font-size="10" fill="#777" font-family="sans-serif">Build tracks from A to B!</text>
  <defs>
    <linearGradient id="prevSky" x1="0" y1="0" x2="0" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#D4EEFF"/>
      <stop offset="1" stop-color="#F0F8FF"/>
    </linearGradient>
  </defs>
</svg>
