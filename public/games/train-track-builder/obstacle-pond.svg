<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60" fill="none">
  <!-- Water body -->
  <ellipse cx="30" cy="36" rx="24" ry="16" fill="#5BC0EB"/>
  <ellipse cx="30" cy="36" rx="24" ry="16" fill="url(#pondGrad)"/>
  <!-- Ripples -->
  <ellipse cx="24" cy="34" rx="8" ry="3" fill="none" stroke="white" stroke-width="0.8" opacity="0.4"/>
  <ellipse cx="36" cy="38" rx="6" ry="2.5" fill="none" stroke="white" stroke-width="0.6" opacity="0.3"/>
  <!-- Lily pad -->
  <ellipse cx="38" cy="32" rx="6" ry="4" fill="#5FA663"/>
  <path d="M38,28 L38,32" stroke="#7BC47F" stroke-width="0.5" fill="none"/>
  <!-- Lily flower -->
  <circle cx="39" cy="30" r="2" fill="#FFB7C5"/>
  <circle cx="39" cy="30" r="1" fill="#FF8FAB"/>
  <!-- Small stones around edge -->
  <ellipse cx="10" cy="40" rx="3" ry="2" fill="#B5B5B5" opacity="0.5"/>
  <ellipse cx="50" cy="38" rx="2.5" ry="1.8" fill="#ABABAB" opacity="0.5"/>
  <!-- Grass tufts at edge -->
  <path d="M8,36 Q9,30 10,36" stroke="#5FA663" stroke-width="1" fill="none"/>
  <path d="M52,34 Q53,28 54,34" stroke="#5FA663" stroke-width="1" fill="none"/>
  <defs>
    <linearGradient id="pondGrad" x1="30" y1="20" x2="30" y2="52" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#88D8F8" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#2A8AB8" stop-opacity="0.4"/>
    </linearGradient>
  </defs>
</svg>
