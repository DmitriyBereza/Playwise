<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60" fill="none">
  <!-- Wooden ties (spanning full width, edge to edge) -->
  <rect x="10" y="12" width="40" height="6" rx="1.5" fill="#A67C30"/>
  <rect x="10" y="24" width="40" height="6" rx="1.5" fill="#A67C30"/>
  <rect x="10" y="36" width="40" height="6" rx="1.5" fill="#A67C30"/>
  <rect x="10" y="48" width="40" height="6" rx="1.5" fill="#A67C30"/>
  <!-- Tie shadows -->
  <rect x="10" y="16" width="40" height="2" rx="1" fill="#8B6914" opacity="0.4"/>
  <rect x="10" y="28" width="40" height="2" rx="1" fill="#8B6914" opacity="0.4"/>
  <rect x="10" y="40" width="40" height="2" rx="1" fill="#8B6914" opacity="0.4"/>
  <rect x="10" y="52" width="40" height="2" rx="1" fill="#8B6914" opacity="0.4"/>
  <!-- Iron rails: centered at x=20 and x=40 so they align with curve exits -->
  <rect x="18" y="0" width="4" height="60" rx="1" fill="#5A5A5A"/>
  <rect x="18" y="0" width="4" height="60" rx="1" fill="url(#railGrad)"/>
  <rect x="38" y="0" width="4" height="60" rx="1" fill="#5A5A5A"/>
  <rect x="38" y="0" width="4" height="60" rx="1" fill="url(#railGrad)"/>
  <defs>
    <linearGradient id="railGrad" x1="0" y1="0" x2="4" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fff" stop-opacity="0.25"/>
      <stop offset="0.5" stop-color="#fff" stop-opacity="0"/>
      <stop offset="1" stop-color="#000" stop-opacity="0.15"/>
    </linearGradient>
  </defs>
</svg>
