<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" fill="none">
  <!-- Sky gradient -->
  <rect width="600" height="200" fill="url(#skyGrad)"/>
  <!-- Clouds -->
  <g opacity="0.6">
    <ellipse cx="100" cy="40" rx="40" ry="16" fill="white"/>
    <ellipse cx="80" cy="36" rx="25" ry="12" fill="white"/>
    <ellipse cx="120" cy="38" rx="20" ry="10" fill="white"/>
  </g>
  <g opacity="0.4">
    <ellipse cx="400" cy="50" rx="35" ry="14" fill="white"/>
    <ellipse cx="380" cy="46" rx="22" ry="10" fill="white"/>
    <ellipse cx="420" cy="48" rx="18" ry="9" fill="white"/>
  </g>
  <g opacity="0.5">
    <ellipse cx="520" cy="30" rx="30" ry="12" fill="white"/>
    <ellipse cx="540" cy="28" rx="20" ry="8" fill="white"/>
  </g>
  <!-- Far hills -->
  <path d="M0,160 Q80,100 200,140 Q300,90 400,130 Q500,100 600,150 L600,200 L0,200Z" fill="#A8D8A0" opacity="0.5"/>
  <!-- Near hills -->
  <path d="M0,180 Q100,130 200,160 Q350,120 500,165 Q550,150 600,170 L600,200 L0,200Z" fill="#7BC47F" opacity="0.6"/>
  <defs>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#D4EEFF"/>
      <stop offset="1" stop-color="#F0F8FF"/>
    </linearGradient>
  </defs>
</svg>
